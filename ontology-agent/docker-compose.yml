services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ontology-password
  ontology-agent-api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: ontology-agent serve --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
